name: Deploy Twisted Corner Detector to Pages

on:
  push:
    branches: ["master"]
    paths:
      - "rubiks-corner-detector/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Upload only the app folder so index.html sits at the site root.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rubiks-corner-detector

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
